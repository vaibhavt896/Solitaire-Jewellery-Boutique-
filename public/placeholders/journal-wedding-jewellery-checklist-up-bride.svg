<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200" role="img" aria-label="Journal — wedding checklist">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F6F1E6"/>
      <stop offset="0.55" stop-color="#EFE8D8"/>
      <stop offset="1" stop-color="#E6DDCB"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.62">
      <stop offset="0" stop-color="#FBF7EE" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#FBF7EE" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E4CA80"/>
      <stop offset="0.5" stop-color="#BD9A45"/>
      <stop offset="1" stop-color="#9A7A2E"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="1200" fill="url(#bg)"/>
  <rect width="1200" height="1200" fill="url(#glow)"/>

  <!-- Engraved double hairline frame -->
  <rect x="54" y="54" width="1092" height="1092" rx="22" fill="none" stroke="url(#gold)" stroke-opacity="0.30" stroke-width="1.5"/>
  <rect x="72" y="72" width="1056" height="1056" rx="14" fill="none" stroke="#9A7A2E" stroke-opacity="0.12" stroke-width="1"/>

  <!-- Thin brilliant-cut diamond mark -->
  <g transform="translate(600 452) scale(0.92)" fill="none" stroke="url(#gold)" stroke-width="3.4" stroke-linejoin="round" stroke-linecap="round" opacity="0.9">
    <path d="M-70 -34 L-40 -74 L40 -74 L70 -34 L0 64 Z"/>
    <path d="M-70 -34 L70 -34 M-40 -74 L-12 -34 L0 64 M40 -74 L12 -34 L0 64 M-12 -34 L12 -34"/>
  </g>

  <!-- Eyebrow -->
  <text x="600" y="612" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="29" letter-spacing="9" fill="#9A7A2E">JOURNAL · BRIDAL</text>

  <!-- Title -->
  <text x="600" y="704" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="60" fill="#1A1410">The Wedding Checklist</text>

  <!-- Ornamental hairline with diamond dots -->
  <g transform="translate(600 758)">
    <line x1="-150" y1="0" x2="-20" y2="0" stroke="url(#gold)" stroke-opacity="0.55" stroke-width="1.4"/>
    <line x1="20" y1="0" x2="150" y2="0" stroke="url(#gold)" stroke-opacity="0.55" stroke-width="1.4"/>
    <path d="M0 -7 L7 0 L0 7 L-7 0 Z" fill="url(#gold)" opacity="0.85"/>
  </g>

  <!-- Branded signoff -->
  <text x="600" y="828" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="21" letter-spacing="7" fill="#8A7C64">SOLITAIRE · SWAROOP NAGAR</text>
</svg>
